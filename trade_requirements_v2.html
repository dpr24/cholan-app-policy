# JAPOON V3 — OPERATIONAL BLUEPRINT
<div class="subtitle">Autonomous NIFTY 50 Options Trading & Moment-of-Capture Logic</div>

---

## 1. STRATEGIC PHILOSOPHY
JAPOON V3 is engineered to exploit the high-probability momentum shifts identified by **1-Hour MACD Crossovers** while simultaneously mitigating "price chasing" through a strictly enforced **Premium Pullback Entry Gate**. 

Unlike conventional trading bots that enter precisely at the signal tick, V3 recognizes that crossovers are often followed by a temporary exhaustion of momentum (a pullback). By waiting for a specific mathematical reduction in option premium from the crossover's anchor price, the system secures an improved cost basis, significantly enhancing the final Reward-to-Risk ratio.

---

## 2. MODULE A: SIGNAL INTELLIGENCE (THE MACD ENGINE)

The system relies on the **Moving Average Convergence Divergence (MACD)** as its sole directional compass. This eliminates the "Analysis Paralysis" caused by conflicting indicators.

### 2.1 The Directional Filter
- **Bullish Bias (CALL)**: Initiated when the MACD Line (12,26) traverses above the Signal Line (9) on the 1-Hour timeframe.
- **Bearish Bias (PUT)**: Initiated when the MACD Line traverses below the Signal Line on the 1-Hour timeframe.

### 2.2 The Staleness Sentinel (5-Hour Rule)
To prevent entering trades based on exhausted trends, the system implements a **5-Candle Staleness Filter**.
- If the MACD crossover occurred more than 5 candles (5 hours) ago, the signal is discarded.
- This ensures the system only engages with "fresh" momentum.

### 2.3 The Single-Bias Protocol
To maintain psychological and mathematical consistency, the system **locks the bias** for the remainder of the trading day once a signal is successfully verified. This prevents "whipsaw" losses during choppy, sideways markets.

---

## 3. MODULE B: THE DYNAMIC ANCHOR CONTROL (CROSSPRICE)

This is the most critical logic update in V3. It solves the problem of "Moving Goalposts" where traditional systems capture prices late, resulting in impossible entry targets.

### 3.1 The "Moment-of-Capture" Synchronization
The system does not just record the price when it "notices" the cross. It synchronizes the capture with the **Crossover Candle Index**.

| Step | Action | Description |
| :--- | :--- | :--- |
| **01** | **Detect** | MACD Crossover identified on 1H chart. |
| **02** | **Validate** | System checks if this is a *new* crossover by comparing the current Candle Index with the last stored Index in Redis. |
| **03** | **Anchor** | If it's a new cross, the system captures the **live contract premium** at that exact second. This is the **CrossPrice**. |
| **04** | **Check** | If the crossover index hasn't changed, the system continues using the *original* anchor, ensuring we don't "chase" the price up. |

### 3.2 The Redis Reliability Layer
The `CrossPrice` and its associated `CandleIndex` are persisted in a Redis cache with a 24-hour expiration. This ensures that even if the server restarts, the system remembers exactly where the original entry signal was anchored.

---

## 4. MODULE C: ENTRY GATE ARCHITECTURE (THE PULLBACK)

V3 implements a **Buy-The-Dip** strategy for Option Premiums. Entry is strictly barred until the premium "pulls back" from the anchor.

### 4.1 Tier 1: Partial Entry (Scale-In)
- **Condition**: Contract Premium drops between **₹10.00 and ₹22.00** from the `CrossPrice`.
- **Action**: Execute Buy Order for **1 Lot (25 Qty)**.
- **Purpose**: Establishes a baseline position at a discounted price while reserving capital for further volatility.

### 4.2 Tier 2: Deep Entry (Final Load)
- **Condition**: Contract Premium drops between **₹22.00 and ₹50.00** from the `CrossPrice`.
- **Action**: Execute Buy Order for an additional **1 Lot**.
- **Result**: The "Averaged Entry Price" is significantly lower than the price at the initial crossover moment.

### 4.3 The "Dead-Zone" Safety logic
- If the premium drops **more than ₹50.00** from the `CrossPrice`, the system flags the trade as "Invalidated."
- **Logic**: A drop of this magnitude indicates the trend has likely failed, and "buying the dip" would turn into "catching a falling knife."

---

## 5. MODULE D: ASSET SELECTION & CONTRACT GOVERNANCE

The system performs intelligent expiry and strike selection to maximize Delta while minimizing Theta decay.

### 5.1 Deep-In-The-Money (ITM) Strike Selection
V3 avoids "cheap" Out-of-the-Money options. It strictly selects strikes that are:
- **CALLs**: At least 100 points below current Spot.
- **PUTs**: At least 100 points above current Spot.
- **Benefit**: This results in a higher Delta (~0.6 to 0.8), meaning the option moves almost in lockstep with the index.

### 5.2 Expiry Roll Protocol (7-Day Rule)
- The system automatically filters for weekly contracts.
- **Safety Rule**: Minimum 7 days to expiration (DTE). 
- If the current weekly expiry has < 7 days remaining (usually on a Friday or Monday), the system **rolls to the next weekly series**. This prevents rapid time decay (Theta) from eating into profits.

---

## 6. MODULE E: THE EXIT MATRIX (TERMINATION LOGIC)

V3 uses a multi-layered exit strategy to "lock in" gains while allowing for trend extensions.

### 6.1 Logical Exit Triggers
| Trigger | Parameter | Action |
| :--- | :--- | :--- |
| **ROI Target** | Hits **+27%** absolute return. | Full Liquidation |
| **Rapid Profit** | Hits **+8%** within < 60 minutes. | Full Liquidation (Protects against spikes) |
| **Pivot Wall** | Price touches R1/R2/R3 or S1/S2/S3. | Full Liquidation (If profit > 12 points) |
| **S&R Extension** | Index moves 50 points past a Pivot level. | Full Liquidation |
| **Opposite Flip** | MACD Histogram crosses zero on **15M/30M**. | Immediate Termination |
| **Temporal Cutoff** | Clock hits **15:10 IST**. | Mandatory System-wide exit |

### 6.2 Partial Profit Booking
Once a position reaches **10% ROI** or **12 premium points** of profit, the system automatically sells **50% of the volume**. This ensures the trade is protected even if the market reverses.

---

## 8. RISK PARAMETERS & COMPLIANCE

- **Stop Loss**: Implicitly managed via the MACD 15M/30M reversal and the ₹50 point max-drop invalidation.
- **Gap Protection**: If the index GAPs more than 1.5% at open, the system enters a 30-minute stabilization hold.
- **Capital Barrier**: Maximum utilization capped at 1.0 Lakh INR.
- **Re-Entry Restriction**: No more than 2 entries permitted per day to prevent over-trading in volatile sideways ranges.

---

## 9. OPERATIONAL AUDIT TRAIL

The system generates high-fidelity plain-text audits for every decision.
1. `PREFLIGHT_START`: Data integrity check.
2. `CROSSOVER_PRICE_CAPTURED`: Documentation of the anchor moment.
3. `ENTRY_SCALING_IN`: Tier-aware execution logs.
4. `EXIT_EXECUTED`: Mathematical PnL breakdown.

---

## 10. CONCLUSION
JAPOON V3 is not just a bot; it is a **regimented execution framework**. By synchronizing the "Anchor" to the specific pulse of the crossover and demanding a "Pullback" before entry, it removes human emotional error and ensures every trade is executed with a mathematical edge.
