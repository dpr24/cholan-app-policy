# REQUIREMENTS FOR FINAL OPTION BUYING SYSTEM UPDATE 5 (V2)

## 1. System Overview
This document serves as the professional blueprint for the 'Final Option Buying System (PRO Version)'. It lays out the operational logic, deterministic entry/exit parameters, time barriers, risk controls, and algorithmic guidelines governing the trading system.

### 1.1 Simulated Execution Environment (Mock Trading Mode)
* **Current Operational State:** To rigorously test and structurally validate the underlying strategy accuracy before risking live funds, the system will exclusively operate within a secure **Virtual Paper Trading Environment** initially.
* **Capital Setup Limits:** The algorithmic trading system will be seeded with precisely **1,00,000 INR (1 Lakh) of virtual mock capital**.
* **Real-Time Data Matrix:** Despite utilizing simulated mock collateral, the system restricts data-blindness by aggressively consuming entirely **live real-market data connections**—including real dynamic spot prices, live options chains, and real execution premiums—calculating all strategies exactly identically to a live deployment framework.
* **P&L Synthesization Mechanism:** Upon seamlessly entering or fully liquidating fractional 2-lot scale executions, the core systemic engine physically updates actively shifting Profit & Loss stat metrics matching absolutely accurately corresponding directly functionally against real-time market action updates natively. *(TLDR: Real Life Market Conditions & Real Signal Checks evaluated cleanly using 1 Lakh Virtual Funds).*

## 2. Core Trading Logic Strategy 
### 2.1 Market State Verification (Initial Gate)
* **Primary Requirement:** The system must explicitly verify whether the market is officially OPEN for the current calendar day. 
* **Halt Function:** If the market is closed (weekends, holidays, etc.), the system safely aborts and halts completely.
* **Flow Continuation:** Subsequent strategy validation rules are executed *only* after an "Open Market" status is confirmed.

### 2.2 Directional Bias & VWAP Configuration
The initial trade direction is deterministically established using purely the 1H or 45M Timeframe MACD Crossover combined explicitly with the VWAP (Volume Weighted Average Price) validation marker.
* **Bullish Signal Context:** Requires a buy action on **CALL**. Asset price must structurally explicitly track **ABOVE the VWAP line**.
* **Bearish Signal Context:** Requires a buy action on **PUT**. Asset price must structurally explicitly track **BELOW the VWAP line**.
* **CRITICAL CONSTRAINT:** The system strictly confines execution to **ONLY ONE directional bias per day**.

### 2.3 Chronological Workflows (Time Rules)
* **Opening Window Constraint:** Initial entries are strictly prohibited before **9:45 AM**.
* **Closing Window Constraint:** New entries are explicitly barred after **2:00 PM**.
* **Mandatory Exit Rule:** A strictly prioritized closure of all open positions must occur at exactly **3:10 PM**.

### 2.4 Executional Architecture Context (Trade Structure)
* **Session Cap Limit:** A hard ceiling restriction of **2 distinct trade executions** per session (day).
* **Re-entry Prerequisites:** Re-entry trades are exclusively authorized if and only if:
  1. The first trade sequence attained a booked, realized profit.
  2. The final definitive exit of the first trade occurred before precisely **12:30 PM**.

## 3. Predictive Trendline Criteria (Finalized Logic)
### 3.1 Line Architecture & Blueprint
* **Anchors:** Lines must invariably be drawn attaching to the most recent swing highs and/or low anchors.
* **Forward Projection:** Trendlines must be physically extended a minimum of **180 candles into the future timeframe axis**.

### 3.2 Formative Geometry (The ≥ 40° Angle Constraint)
* **Requirement:** The trendline inclination/declination angle must consistently exhibit an angle measuring **above ~40° from the absolute horizontal**.
* **Rejection Mandate:** If an indicated trendline presents a shallow angle (flat trajectory), the system dictates **NO OPERATION**; the trend is designated as inherently *weak*.
* **Permitted Timeframes:** Geometrical trend projection is bounded to **1 Hour (1H)** and **45 Minutes (45M)** resolutions.

## 4. Entry Protocol Specification (Strict Pullback Mode)
### 4.1 Permitted Model Context (Pullback Integration)
* **Exclusive Format:** Only *Pullback / Retracement* formatted entries are certified valid.
* **Pullback Origin Logic (MACD Marker):** To systematically measure and detect a pullback, the system officially flags the exact **MACD Crossover Candle** as the reference origin point. Active pullback scanning operations begin anchored directly from this originating crossover candle.
* **Sequence Logic:** Market price must distinctly separate/move away from the designated trendline, and then exhibit a technical "return framework" to test the prior boundaries.
* **Fibonacci Confluence (Detection Tool):** Use the Fibonacci retracement tool to mathematically confirm the pullback. A retracement landing exactly within the **0.5 to 0.6 Zone** can be utilized to definitively validate the pullback phase.
* **Violation Constraints:** 
  1. No engagement into ongoing technical Breakouts (NO CHASING).
  2. No execution if the market price is isolated excessively far from the active trendline.

### 4.2 Entry Confirmation Gate (8-Point Test)
The definitive ENTRY requires synchronous approval of the following structural conditions:
1. Valid directional stance established under 1H/45M MACD context.
2. Price action direction validated precisely against **VWAP criteria** (Above VWAP for CALL / Below VWAP for PUT).
3. Valid geometrical projection of trendline (≥ 40° pitch angle).
4. Trendline strictly projected longitudinally by 180 forward candles.
5. Definitive price action confirming a "pullback test" functionally close to the trendline (validated precisely using the **Fibonacci 0.5 - 0.6 Zone** detection).
6. Absolute alignment confirmation from a lower-bracket **15-Minute or 30-Minute MACD**.
7. Spatial proximity constraint: Execution order placement must be situated near the trendline.
8. Upon validation spanning states 1 through 7: Initialize allocation to the directional **CALL/PUT**.

### 4.3 Pattern Decay Context: Weak Trendline Reversals
* **Decay Threshold Parameter:** The occurrence of exactly **3 separate touches** onto a regular trendline diminishes its structural validity—it is designated subsequently as "weakened".
* **Alternative Trading Sequence Under Pattern Decay:**
  1. Detect the existence of an inverse MACD trend crossover.
  2. Perceive the market price retreating spatially from the prior anchor trendline axis.
  3. Effectuate an off-line entry execution directly away from the old trendline.
  4. Synthesize a brand-new Trendline construct.
  5. Extend the latest line iteratively by 180 forward candles.

## 5. Contract Selection & Capital Disbursement Structure
### 5.1 Options Contract Selection Criteria
Before finalizing an order ticket, the system must precisely select the correct option bounds:
* **Expiry Search Constraint:** The system must specifically search for and select **second-week contract strikes** strictly.
* **Strike Points Selection:** The strike price targeted must universally possess a precise offset constraint of **100 to 150 points** respectively, applying identically to both CALL and PUT executions.

> **Practical Execution Example (NIFTY50 Focus):**  
> * **Condition Match:** NIFTY50 spot price currently hovers near **22,000**. 
> * **Expiry Verification:** The system skips the active current-week option chain (e.g., 12th April) and immediately targets the **second-week option chain** (e.g., 19th April).
> * **Strike Application (CALL Configuration):** Under a bullish MACD setup, the system calculates a +100 to +150 offset. It securely selects either the **22,100 CE** or **22,150 CE** strike.
> * **Strike Application (PUT Configuration):** Under a bearish MACD setup, the system calculates a -100 to -150 offset. It securely selects either the **21,900 PE** or **21,850 PE** strike.


### 5.2 Three-Phase Incremental Procurement Scheme (Fibonacci Scaled Entry)
Capital scaling is fragmented strictly into 2-lot increments triggering within mathematically defined Fibonacci pullback limits:
* **Zone 1 Structure:** Activate **2 lots** exactly as price enters the **0.3 to 0.5** Fibonacci zone.
* **Zone 2 Structure:** Activate **2 lots** exactly as price enters the **0.5 to 0.6** Fibonacci zone.
* **Zone 3 Structure:** Activate **2 lots** exactly as price enters the **0.6 to 0.7** Fibonacci zone.
*(Note: Maximum positional allocation sequence totals 6 lots executed directly based on depth of pullback).*

### 5.3 Fractional Realization Standard (Initial Exit for FIRST TRADE)
* **Tier 1 (50% Positional Liquidation from total filled units):**
  * Divested precisely upon earning either a numerical **10%** equity profit OR earning structurally **12 to 15 premium points**. 
* **Tier 2 (Defending the Remaining 50% Positional Balance):** 
  * Dictated actively by the standard holistic exit protocols defined below. 

## 6. Comprehensive Exit Criteria 
### 6.1 First Trade Core Exit Protocol
Total market extraction is ordered sequentially when **ANY single parameter** is positively triggered:
* Profit trajectory yielding **18% to 27% ROI** (measured proportionally from absolute high to low).
* Alternatively, if a **5% to 8% return threshold** is met actively within a timeframe under **1 Hour post-entry**. 
  *(Note: A contingent Re-entry may be executed safely under this clause strictly requiring a > 40% structural pullback localized to the earlier profit-booked candle).*
* Price objective directly intercepts a Pivot / Support & Resistance structural wall (mandatory operational yield must validate a ≥ 12 absolute points minimum threshold).
* Emergence of an **Opposite facing MACD** technical signal. 
* Breakage in structural Trendline support (Validated exclusively when an overarching **15-Minute specific candle definitively closes entirely isolated/outside** the trendline perimeter).
* Final execution block hits daily operational constraint timeouts at exactly **3:10 PM**.

### 6.2 Secondary Phase Context (The Re-Entry Exit Parameters)
Re-entrant operations observe rigid defensive parameters; market extraction ordered linearly via ANY of the localized rule sets:
* Inverse action denoted by an Opposite trajectory facing MACD indicator spanning **15-Min / 30-Min timeframe thresholds**. 
* Trendline breakage sequence functioning exactly under **15-Minute timeline closures** positioned entirely outside parameters. 
* Final structural timeout clock terminates effectively reaching **3:10 PM**. 

### 6.3 Absolute Pivot & S&R Interaction filtering
* **Entry Approval Gate:** Operations allowed natively near designated Support/Resistance levels *only if the foundational trendline analysis correlates efficiently with the intended direction*.
* **Limit Approval Target:** Validation for extraction at a Pivot or S&R zone mandates that the exit provides an absolute total net baseline of **≥ 12 positive points threshold**.

        renderer.listitem = function(text, task, checked) {
            if (task) {
                // Return custom styled div wrapper mimicking native lists
                return `<li style="list-style-type: none; display: flex; align-items: flex-start; margin-left: -1.5rem;"><input type="checkbox" disabled="" ${checked ? 'checked=""' : ''}> <span style="margin-top: 1px;">${text}</span></li>`;
            }
            return originalListitem(text, task, checked);
        };
        
        // Parse and Inject HTML
        document.getElementById('content').innerHTML = marked.parse(markdownContent, { renderer: renderer });

        // Extract <pre> blocks targeting mermaid, format them directly so Mermaid can run autonomously without syntax errors
        const renderMermaid = async () => {
            const preTags = document.querySelectorAll('pre code.language-mermaid');
            preTags.forEach((codeBlock) => {
                const pre = codeBlock.parentElement;
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = codeBlock.textContent;
                pre.replaceWith(mermaidDiv);
            });
            await mermaid.run();
        };

        // Fire render
        renderMermaid();
