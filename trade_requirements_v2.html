# REQUIREMENTS FOR JAPOON V3 — MACD & PREMIUM PULLBACK

## 1. System Overview
This document establishes the professional blueprint for 'JAPOON V3'. It establishes the operational logic, deterministic entry/exit parameters, risk controls, and algorithmic guidelines for automated NIFTY 50 options trading. V3 prioritizes high-confidence MACD crossovers followed by mathematically precise premium-price pullbacks.

### 1.1 Execution Environment
* **Virtual Paper Trading:** The system operates securely within a **Virtual Paper Trading Environment** (Mock Mode).
* **Capital Simulation:** Seeded with **1,00,000 INR (1 Lakh)** virtual capital.
* **Real-Market Data:** All decisions, premiums, and contract selections utilize live real-market data feeds, ensuring identical performance behavior to a live account.

## 2. Core Operational Constraints
### 2.1 Asset Universe & Instrument
* **Primary Underlying:** NIFTY 50 (Spot Index).
* **Instrument:** Weekly/Weekly+ ITM Options (CE/PE).
* **Directional Signal:** 1-Hour (1H) MACD Crossover.

### 2.2 Directional Logic & Bias Lock
* **Bullish Crossover (CALL):** MACD Line crosses ABOVE the Signal Line on 1H timeframe.
* **Bearish Crossover (PUT):** MACD Line crosses BELOW the Signal Line on 1H timeframe.
* **Daily Bias Lock:** Once a valid crossover occurs and is accepted, the system locks that direction (CALL or PUT) for the remainder of the session.
* **Staleness Filter:** Crossover signals must have occurred within the last 5 candles (5 hours) to be eligible.

### 2.3 Chronological Barriers (IST)
* **Opening Entry Window:** No entry sequences permitted before **09:45 AM**.
* **Closing Entry Window:** New entries are strictly barred after **2:00 PM**.
* **Hard Mandatory Exit:** Total liquidation of all positions occurs exactly at **3:10 PM**.

> **Real-Life Example (Temporal Flow):**
> * **10:00 AM:** MACD 1H Bullish Cross detected. Bias locked to **CALL**.
> * **1:30 PM:** Market remains within bias; system continues monitoring for pullback triggers.
> * **2:05 PM:** Even if a massive dip occurs, new entries are blocked by the 2:00 PM cutoff.

## 3. Entry ProtocolSpecification (The Premium Pullback)
### 3.1 Crossover Anchor Capture (CrossPrice)
The moment a valid MACD 1H crossover is verified, the system identifies the prime ITM contract and captures its current Last Traded Price (LTP). This is the **CrossPrice** baseline from which all pullbacks are measured.

### 3.2 Two-Tier Entry Strategy (Scaling)
The system executes a "buy the dip" approach based on the Option Premium's distance from the `CrossPrice`.

* **Tier 1 — Partial Entry (1 Lot):**
    * Triggered when the contract premium drops between **₹10** and **₹22** from the `CrossPrice`.
* **Tier 2 — Deep Entry (1 Lot):**
    * Triggered when the contract premium drops between **₹22** and **₹50** from the `CrossPrice`.

*(Note: If the premium drops more than ₹50 from the `CrossPrice`, the setup is considered failed/invalid for safety).*

*(Note: Fibonacci zones and Trendlines are explicitly removed. Entry is strictly governed by the premium's absolute point reduction from the crossover moment).*

> **Real-Life Example (Scaling Context):**
> * AT 10:15 AM: MACD Cross occurs. 22200 CE is at ₹150 (`CrossPrice`).
> * AT 10:45 AM: Market dips; CE hits ₹140 (₹10 drop). **Tier 1 Entry: 1 Lot.**
> * AT 11:20 AM: Deeper volatility; CE hits ₹128 (₹22 drop). **Tier 2 Entry: 1 Lot.**
> * Result: Position averaged between two tiers of the pullback.

## 4. Contract Selection (ITM & Expiry)
### 4.1 Strike Selection (100+ ITM)
* **Requirement:** Sticks to Deep In-The-Money (ITM) strikes to minimize time decay (Theta) and maximize Delta.
* **Offset:** Strikes must be at least **100 points** ITM (Spot - 100 for CALL, Spot + 100 for PUT).

### 4.2 Expiry Validation (≥ 7 Days)
* **Requirement:** System specifically targets contracts with a minimum of **7 active trading days** to expiration. 
* **Logic:** If current week expiry is < 7 days away, the system rolls to the next weekly series.

### 4.3 Dynamic Option Chain Discovery
* **Scrip Master Integration:** The system automatically downloads the Angel One Scrip Master JSON to identify all legally valid NIFTY contracts.
* **Intelligent Caching:** The 10MB master file is cached locally for **24 hours** to ensure optimal performance and avoid broker API throttling.
* **Dynamic Filtering:** Upon a signal, the system scans all available NIFTY contracts and selects the top **50 strikes** surrounding the current Spot Price (ATM +/- 15 strikes).
* **Live Valuation:** The system fetches real-time "LTP" for these 50 contracts to build a live Option Chain, ensuring the mathematical entry targets are based on true market premiums.

## 5. Comprehensive Exit Matrix
### 5.1 Partial Profit Realization (78% Success Target)
* **Tier 1 (50% Volume):** Divested upon hitting **10% ROI** OR earning **12 absolute premium points**.

### 5.2 Full Liquidation Rules
The system liquidates the entire position if **ANY** of these parameters hit:
1. **Target ROI:** Hits **27%** absolute return.
2. **Rapid ROI:** Hits **8%** return within less than **1 Hour** post-entry.
3. **Pivot Interaction:** Price hits a Pivot line (R1/R2/R3/S1/S2/S3/Pivot) with a minimum **12-point** profit.
4. **S&R Extension:** Price pushes **50 index points** past a major Pivot wall.
5. **Opposite MACD:** A 15-Minute or 30-Minute MACD Flip (histogram crossing zero against the bias).
6. **Force Exit:** Daily hard cutoff at **3:10 PM**.

## 6. Operational Checklist
- [ ] **Market Status:** Verified OPEN (9:15 - 15:10).
- [ ] **Data Integrity:** Scrip Master discovery (24h cache) verified.
- [ ] **Setup Detection:** 1H MACD Crossover confirmed within 5 hours.
- [ ] **Anchor Capture:** `CrossPrice` recorded for the target ITM contract.
- [ ] **Tier 1 Validation:** Contract price dropped ₹10 from anchor.
- [ ] **Tier 2 Validation:** Contract price dropped ₹22 from anchor.
- [ ] **Audit Trail:** Plain-text logs tracing capture → partial entry → deep entry → exit.

    <script>
        // Configure Mermaid to support dark mode professionally
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose'
        });

        // Fetch markdown text
        const markdownContent = document.getElementById('markdown-content').textContent;

        // Custom rendering extension for checkboxes (read-only styling)
        const renderer = new marked.Renderer();
        const originalListitem = renderer.listitem.bind(renderer);
        renderer.listitem = function (text, task, checked) {
            if (task) {
                // Return custom styled div wrapper mimicking native lists
                return `<li style="list-style-type: none; display: flex; align-items: flex-start; margin-left: -1.5rem;"><input type="checkbox" disabled="" ${checked ? 'checked=""' : ''}> <span style="margin-top: 1px;">${text}</span></li>`;
            }
            return originalListitem(text, task, checked);
        };

        // Parse and Inject HTML
        document.getElementById('content').innerHTML = marked.parse(markdownContent, { renderer: renderer });

        // Extract <pre> blocks targeting mermaid, format them directly so Mermaid can run autonomously without syntax errors
        const renderMermaid = async () => {
            const preTags = document.querySelectorAll('pre code.language-mermaid');
            preTags.forEach((codeBlock) => {
                const pre = codeBlock.parentElement;
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = codeBlock.textContent;
                pre.replaceWith(mermaidDiv);
            });
            await mermaid.run();
        };

        // Fire render
        renderMermaid();
    </script>
