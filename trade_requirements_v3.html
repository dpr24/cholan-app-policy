---
## 1. STRATEGIC PHILOSOPHY
JAPOON V3 is engineered to exploit high-probability momentum shifts identified by **1-Hour MACD crossovers** and confirms direction using one lower timeframe MACD (**15M or 30M**) before allowing entries. 
The execution model remains pullback-based to avoid chasing premium spikes and to improve entry quality.
---
## 2. MODULE A: SIGNAL INTELLIGENCE (THE MACD ENGINE)
The system relies on the **Moving Average Convergence Divergence (MACD)** as the directional engine.
### 2.1 The Two-Timeframe Alignment Filter (Primary Rule)
- Entry is allowed only when **1-Hour MACD crossover direction** and **one lower timeframe MACD direction (15-Minute or 30-Minute)** are aligned.
- **Bullish Entry (CALL)**: 1H MACD bullish crossover + (15M bullish OR 30M bullish).
- **Bearish Entry (PUT)**: 1H MACD bearish crossover + (15M bearish OR 30M bearish).
- Core rule for entry: **any 2 MACDs (1 higher timeframe + 1 lower timeframe) must agree in direction**.
### 2.2 No Candle-Count Restriction
- Previous candle-age/freshness filters are removed.
- **No 5-candle, 10-candle, or any candle-window restriction** is applied for entry validation.
### 2.3 Bias Handling
- Bias remains valid only while required MACD alignment is present.
- If alignment breaks, new entries are blocked until alignment returns.
---
## 3. MODULE B: DYNAMIC ANCHOR CONTROL (CROSSPRICE)
The system anchors pullback logic to a captured CrossPrice and uses that as the premium reference point.
### 3.1 Moment-of-Capture Synchronization
| Step | Action | Description |
| :--- | :--- | :--- |
| **01** | **Detect** | 1H MACD crossover identified. |
| **02** | **Validate** | Confirms alignment with 15M or 30M MACD direction. |
| **03** | **Anchor** | Captures live contract premium as CrossPrice. |
| **04** | **Reuse** | Reuses anchor until new valid crossover/alignment cycle is formed. |
### 3.2 Persistence Layer
- CrossPrice metadata can be persisted in Redis for restart resilience.
---
## 4. MODULE C: ENTRY GATE ARCHITECTURE (PULLBACK ENTRY)
V3 uses **pullback entry** only. No direct chase entries.

- MACD alignment and pullback conditions must be satisfied within this window.

        // Configure Mermaid to support dark mode professionally
        mermaid.initialize({

        // Fetch markdown text

        // Parse and Inject HTML
        document.getElementById('content').innerHTML = marked.parse(markdownContent, { renderer: renderer });

        // Extract <pre> blocks targeting mermaid
        const renderMermaid = async () => {
            const preTags = document.querySelectorAll('pre code.language-mermaid');
            preTags.forEach((codeBlock) => {
                const pre = codeBlock.parentElement;
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = codeBlock.textContent;
                pre.replaceWith(mermaidDiv);
            });
            await mermaid.run();
        };

        renderMermaid();
